<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thông tin phòng - PTIT</title>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background-color: #fff5f5; height: 100vh; display: flex; flex-direction: column; }

    .header { background-color: #ff3333; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; color: white; flex-shrink: 0; }
    .menu-icon { font-size: 30px; cursor: pointer; }
    .back-btn-top { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px; margin-left: auto; }
    .back-btn-top:hover { color: #ffcccc; }

    .container { display: flex; flex: 1; overflow: hidden; }

    .sidebar { width: 300px; background-color: white; border-right: 2px solid #ff3333; display: flex; flex-direction: column; padding: 20px 0; overflow: hidden; transition: width 0.3s ease, border 0.3s ease; flex-shrink: 0; }
    .sidebar.collapsed { width: 0; border: none; }
    .menu-list { flex: 1; padding: 0 20px; overflow-y: auto; }

    .menu-section-title { color: #ff3333; font-weight: bold; font-size: 16px; margin-top: 15px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .menu-section-title:hover { color: #cc0000; }

    .menu-item { padding: 12px 0 12px 20px; border-bottom: 2px solid #ffcccc; color: #ff3333; font-size: 16px; cursor: pointer; display: flex; align-items: center; text-decoration: none; transition: color 0.3s; }
    .menu-item:hover { color: #cc0000; }
    .menu-item.active { font-weight: bold; }

    .sidebar-footer { padding: 20px; display: flex; align-items: center; gap: 10px; }
    .footer-logo { width: 50px; height: auto; }
    .footer-text { font-size: 10px; font-weight: bold; color: #cc3333; text-transform: uppercase; line-height: 1.3; }

    .main-content { flex: 1; padding: 30px; overflow-y: auto; }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; }
    .room-title { color: #ff3333; font-size: 28px; font-weight: bold; margin: 0; }

    .search-edit-wrapper { display: flex; gap: 15px; align-items: center; }
    .search-box { border: 2px solid #ff3333; border-radius: 20px; padding: 12px 20px; font-size: 14px; color: #ff3333; min-width: 250px; background-color: white; }
    .search-box::placeholder { color: #ff9999; }

    .btn-edit { background-color: transparent; color: #ff3333; border: 2px solid #ff3333; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; transition: all 0.3s; }
    .btn-edit:hover { background-color: #ff3333; color: white; }

    table { width: 100%; border-collapse: collapse; background-color: white; }
    table th { background-color: transparent; color: #ff3333; font-weight: bold; font-size: 15px; padding: 15px; text-align: center; border: 2px solid #ff3333; border-bottom: 2px solid #ff3333; }
    table td { padding: 15px; border: 2px solid #ff3333; color: #333; font-size: 14px; text-align: center; }
    table tr:hover { background-color: #fff9f9; }

    .link-see { color: #ff3333; text-decoration: underline; cursor: pointer; }
    .link-see:hover { color: #cc0000; }

    /* Modal */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
    .modal-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border: 2px solid #ff3333; border-radius: 10px; width: 700px; max-width: 90%; position: relative; }

    .modal-close-btn { position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 28px; color: #ff3333; cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; transition: color 0.3s; }
    .modal-close-btn:hover { color: #cc0000; }

    .modal-header { font-size: 20px; font-weight: bold; color: #ff3333; margin-bottom: 15px; }

    .edit-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #ff3333; }
    .edit-tab-btn { flex: 1; padding: 12px; background-color: #fff5f5; color: #ff3333; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-weight: bold; font-size: 14px; transition: all 0.3s; }
    .edit-tab-btn.active { background-color: white; border-bottom: 3px solid #ff3333; }
    .edit-tab-btn:hover { background-color: white; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .add-member-section, .delete-member-section { padding: 10px 0; }
    .add-member-section label { display:block; color:#ff3333; font-weight:bold; margin-bottom:5px; font-size:14px; }
    .add-member-section input, .add-member-section select {
      display:block; width:100%; padding:10px; margin-bottom:10px;
      border:1px solid #ff9999; border-radius:5px; font-size:14px;
      background-color:white;
    }

    .delete-member-list { max-height: 300px; overflow-y: auto; padding: 10px; border: 1px solid #ffcccc; border-radius: 5px; background-color: #fff9f9; }
    .delete-member-list label { display:flex; align-items:center; gap:10px; padding:8px; color:#ff3333; cursor:pointer; }
    .delete-member-list input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

    .modal-buttons { display:flex; gap:10px; justify-content:flex-end; margin-top: 10px; }
    .modal-btn { padding: 8px 15px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-size:14px; }
    .modal-btn-add { background-color:#ff3333; color:white; }
    .modal-btn-add:hover { background-color:#cc0000; }
    .modal-btn-cancel { background-color:#ccc; color:#333; }
    .modal-btn-cancel:hover { background-color:#999; }

    .overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
    .room-card { background: white; border: 2px solid #ff3333; border-radius: 10px; padding: 20px; cursor: pointer; transition: all 0.3s; text-decoration: none; color: #333; }
    .room-card:hover { background-color: #fff5f5; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255, 51, 51, 0.2); }
    .room-card-title { font-size: 20px; font-weight: bold; color: #ff3333; margin-bottom: 10px; }
    .room-card-info { font-size: 14px; color: #666; margin-bottom: 5px; }
  </style>
</head>

<body>
  <div class="header">
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <button id="backTopBtn" class="back-btn-top" onclick="goBack()">←</button>
  </div>

  <div class="container">
    <div class="sidebar" id="sidebar">
      <div class="menu-list">
        <a href="home.html" class="menu-item">🏠 Trang chủ</a>
        <a href="room_info.html?view=overview" class="menu-item" onclick="showOverviewHandler(event)">📋 Thông tin phòng</a>

        <div class="menu-section-title" onclick="toggleSection(this)">▶ Khu A</div>
        <div class="menu-subsection" style="display: none;">
          <a href="room_info.html" class="menu-item" data-room="A1">Phòng A1</a>
          <a href="room_info.html" class="menu-item" data-room="A2">Phòng A2</a>
        </div>

        <div class="menu-section-title" onclick="toggleSection(this)">▶ Khu B</div>
        <div class="menu-subsection" style="display: none;">
          <a href="room_info.html" class="menu-item" data-room="B1">Phòng B1</a>
          <a href="room_info.html" class="menu-item" data-room="B2">Phòng B2</a>
        </div>

        <a href="https://youtu.be/dQw4w9WgXcQ?si=Bil_istASGQg0YK5" class="menu-item" target="_blank">Hỗ trợ</a>
      </div>

      <div class="sidebar-footer">
        <img src="https://dhs.ptit.edu.vn/web/image/385-67ae5bc7/Logo_PTIT_University.png" alt="Logo" class="footer-logo">
        <div class="footer-text">
          HỌC VIỆN CÔNG NGHỆ BƯU CHÍNH<br>
          VIỄN THÔNG CƠ SỞ TP.HỒ CHÍ MINH
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="page-header">
        <h1 class="room-title" id="roomTitle">📋 Thông tin phòng</h1>
        <div class="search-edit-wrapper" id="searchEditWrapper" style="display:none;">
          <input type="text" class="search-box" placeholder="Tìm kiếm..." id="searchInput" onkeyup="filterTable()">
          <button class="btn-edit" onclick="openEditModal()">Chỉnh sửa</button>
        </div>
      </div>

      <div id="overviewContainer" class="overview-grid"></div>

      <div id="roomDetailContainer" style="display:none; width:100%;">
        <table id="membersTable">
          <thead>
            <tr>
              <th>Họ và tên SV</th>
              <th>Mã SV</th>
              <th>Lớp</th>
              <th>Ngày sinh</th>
              <th>Giường</th>
              <th>Hóa đơn</th>
              <th>Thông tin SV</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="editMemberModal" class="modal">
    <div class="modal-content">
      <button class="modal-close-btn" onclick="closeEditMemberModal()">✕</button>
      <div class="modal-header">Chỉnh sửa thành viên phòng</div>

      <div class="edit-tabs">
        <button class="edit-tab-btn active" onclick="switchTab('add')">Thêm sinh viên</button>
        <button class="edit-tab-btn" onclick="switchTab('delete')">Xóa sinh viên</button>
      </div>

      <!-- Add -->
      <div id="add-tab" class="tab-content active">
        <div class="add-member-section">
          <label for="roomSelect">Phòng:</label>
          <select id="roomSelect">
            <option value="A1">Phòng A1</option>
            <option value="A2">Phòng A2</option>
            <option value="B1">Phòng B1</option>
            <option value="B2">Phòng B2</option>
          </select>

          <input type="text" id="studentName" placeholder="Họ và tên sinh viên">
          <input type="text" id="studentCode" placeholder="Mã sinh viên (VD: N23DCVT001)">
          <input type="text" id="studentClass" placeholder="Lớp (VD: D23CQVT01-N)">

          <div style="position: relative;">
            <input type="text" id="studentDob" placeholder="Ngày sinh (dd/mm/yyyy)" maxlength="10" style="padding-right:45px;">
            <input type="date" id="studentDobPicker" style="position:absolute; right:5px; top:50%; transform:translateY(-50%); width:35px; height:30px; border:none; cursor:pointer; background:transparent;">
          </div>

          <input type="text" id="bedNumber" placeholder="Giường (VD: G7)">

          <div class="modal-buttons">
            <button class="modal-btn modal-btn-cancel" onclick="clearAddForm()">Xóa trắng</button>
            <button class="modal-btn modal-btn-add" onclick="addMember()">Thêm sinh viên</button>
          </div>
        </div>
      </div>

      <!-- Delete -->
      <div id="delete-tab" class="tab-content">
        <div class="delete-member-section">
          <div id="deleteCheckboxList" class="delete-member-list"></div>
          <div class="modal-buttons">
            <button class="modal-btn modal-btn-cancel" onclick="closeEditMemberModal()">Hủy</button>
            <button class="modal-btn modal-btn-add" onclick="deleteSelectedMembers()">Xóa đã chọn</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- api.js: phải có hàm apiFetch -->
  <script src="api.js"></script>

  <script>
    const ROOMS = ["A1", "A2", "B1", "B2"];
    let currentRoom = "A1";
    let isOverviewMode = false;

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("collapsed");
      updateActivityTime();
    }

    function toggleSection(element) {
      const subsection = element.nextElementSibling;
      if (subsection && subsection.classList.contains("menu-subsection")) {
        subsection.style.display = subsection.style.display === "none" ? "block" : "none";
        element.textContent =
          subsection.style.display === "none"
            ? "▶ " + element.textContent.slice(2)
            : "▼ " + element.textContent.slice(2);
      }
    }

    function showOverviewHandler(event) {
      event.preventDefault();
      showOverview();
    }

    // ✅ validate dd/mm/yyyy (backend đang parse kiểu này)
    function isValidDDMMYYYY(s) {
      if (!/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return false;
      const [dd, mm, yyyy] = s.split("/").map(Number);
      if (mm < 1 || mm > 12) return false;
      if (dd < 1 || dd > 31) return false;

      // check ngày hợp lệ theo tháng (đơn giản + đủ dùng)
      const daysInMonth = new Date(yyyy, mm, 0).getDate(); // mm: 1..12 ok
      return dd <= daysInMonth;
    }

    async function loadRoom(roomName) {
      if (!roomName) return;

      isOverviewMode = false;
      currentRoom = roomName;

      document.getElementById("roomTitle").textContent = "Phòng " + roomName;
      document.getElementById("searchEditWrapper").style.display = "flex";
      document.getElementById("overviewContainer").style.display = "none";
      document.getElementById("roomDetailContainer").style.display = "block";

      const tableBody = document.getElementById("tableBody");
      tableBody.innerHTML = "";

      try {
        const members = await apiFetch(`/api/rooms/${roomName}/members`);

        members.forEach((member) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${member.name ?? "-"}</td>
            <td>${member.code ?? "-"}</td>
            <td>${member.clazz ?? "-"}</td>
            <td>${member.dob ?? "-"}</td>
            <td>${member.bed ?? "-"}</td>
            <td><a href="#" class="link-see" onclick="goToBill('${member.code}'); return false;">xem</a></td>
            <td><a href="#" class="link-see" onclick="goToStudentInfo('${member.code}'); return false;">xem</a></td>
          `;
          tableBody.appendChild(row);
        });

        await loadDeleteMembersList();
      } catch (e) {
        alert("Không tải được danh sách sinh viên phòng " + roomName + ": " + e.message);
      }

      const backBtn = document.getElementById("backTopBtn");
      if (backBtn) backBtn.style.display = "";
    }

    async function showOverview() {
      isOverviewMode = true;

      document.getElementById("roomTitle").textContent = "📋 Thông tin phòng";
      document.getElementById("searchEditWrapper").style.display = "none";
      document.getElementById("overviewContainer").style.display = "grid";
      document.getElementById("roomDetailContainer").style.display = "none";

      const overviewContainer = document.getElementById("overviewContainer");
      overviewContainer.innerHTML = "";

      try {
        const rooms = await apiFetch("/api/rooms");

        rooms.forEach((r) => {
          const card = document.createElement("a");
          card.href = "#";
          card.className = "room-card";
          card.onclick = function (e) {
            e.preventDefault();
            loadRoom(r.room);
          };

          card.innerHTML = `
            <div class="room-card-title">Phòng ${r.room}</div>
            <div class="room-card-info">Số sinh viên: <strong>${r.memberCount}</strong></div>
            <div class="room-card-info">Khu: <strong>${r.block}</strong></div>
          `;
          overviewContainer.appendChild(card);
        });

        const backBtn = document.getElementById("backTopBtn");
        if (backBtn) backBtn.style.display = "none";
      } catch (e) {
        alert("Không tải được danh sách phòng: " + e.message);
      }
    }

    // search theo tên (FE gọi từng phòng rồi filter)
    async function filterTable() {
      const input = document.getElementById("searchInput");
      const filter = input.value.toLowerCase().trim();

      const table = document.getElementById("membersTable");
      const tableHead = table.querySelector("thead tr");
      const tableBody = document.getElementById("tableBody");

      if (!filter) {
        tableHead.innerHTML = `
          <th>Họ và tên SV</th>
          <th>Mã SV</th>
          <th>Lớp</th>
          <th>Ngày sinh</th>
          <th>Giường</th>
          <th>Hóa đơn</th>
          <th>Thông tin SV</th>
        `;
        await loadRoom(currentRoom);
        return;
      }

      tableHead.innerHTML = `
        <th>Họ và tên SV</th>
        <th>Mã SV</th>
        <th>Lớp</th>
        <th>Ngày sinh</th>
        <th>Phòng</th>
        <th>Hóa đơn</th>
        <th>Thông tin SV</th>
      `;

      tableBody.innerHTML = "";

      try {
        const all = [];
        for (const r of ROOMS) {
          const members = await apiFetch(`/api/rooms/${r}/members`);
          members.forEach((m) => all.push({ ...m, room: r }));
        }

        const searchWords = filter.split(/\s+/).filter(Boolean);

        const matched = all.filter((m) => {
          const name = (m.name || "").toLowerCase().trim();
          const nameWords = name.split(/\s+/).filter(Boolean);
          return searchWords.every((sw) => nameWords.some((nw) => nw.startsWith(sw)));
        });

        if (matched.length === 0) {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td colspan="7" style="text-align:center; color:#ff3333; padding:20px;">
              Không tìm thấy sinh viên phù hợp
            </td>
          `;
          tableBody.appendChild(row);
          return;
        }

        matched.forEach((member) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${member.name ?? "-"}</td>
            <td>${member.code ?? "-"}</td>
            <td>${member.clazz ?? "-"}</td>
            <td>${member.dob ?? "-"}</td>
            <td>${member.room}</td>
            <td><a href="#" class="link-see" onclick="goToBill('${member.code}'); return false;">xem</a></td>
            <td><a href="#" class="link-see" onclick="goToStudentInfo('${member.code}'); return false;">xem</a></td>
          `;
          tableBody.appendChild(row);
        });
      } catch (e) {
        alert("Lỗi tìm kiếm: " + e.message);
      }
    }

    function openEditModal() {
      document.getElementById("editMemberModal").style.display = "block";
      switchTab("add");
      document.getElementById("roomSelect").value = currentRoom;
      setTimeout(setupDateListeners, 0);
      loadDeleteMembersList();
    }

    function closeEditMemberModal() {
      document.getElementById("editMemberModal").style.display = "none";
    }

    function switchTab(tabName) {
      document.querySelectorAll(".tab-content").forEach((tab) => tab.classList.remove("active"));
      document.querySelectorAll(".edit-tab-btn").forEach((btn) => btn.classList.remove("active"));

      if (tabName === "add") {
        document.getElementById("add-tab").classList.add("active");
        document.querySelector('.edit-tab-btn[onclick="switchTab(\'add\')"]').classList.add("active");
        clearAddForm();
      } else {
        document.getElementById("delete-tab").classList.add("active");
        document.querySelector('.edit-tab-btn[onclick="switchTab(\'delete\')"]').classList.add("active");
        loadDeleteMembersList();
      }
    }

    async function loadDeleteMembersList() {
      const checkboxList = document.getElementById("deleteCheckboxList");
      checkboxList.innerHTML = "";

      try {
        const members = await apiFetch(`/api/rooms/${currentRoom}/members`);

        if (!members || members.length === 0) {
          checkboxList.innerHTML = '<p style="color:#ff3333; text-align:center;">Không có sinh viên để xóa</p>';
          return;
        }

        members.forEach((member) => {
          const label = document.createElement("label");
          label.innerHTML = `
            <input type="checkbox" value="${member.code}">
            <span>${member.name} (${member.code}) - Giường ${member.bed ?? "-"}</span>
          `;
          checkboxList.appendChild(label);
        });
      } catch (e) {
        checkboxList.innerHTML = `<p style="color:#ff3333;">Không tải được danh sách: ${e.message}</p>`;
      }
    }

    function clearAddForm() {
      document.getElementById("studentName").value = "";
      document.getElementById("studentCode").value = "";
      document.getElementById("studentClass").value = "";
      document.getElementById("studentDob").value = "";
      document.getElementById("bedNumber").value = "";
      document.getElementById("roomSelect").value = currentRoom;
      document.getElementById("studentName").focus();
    }

    async function addMember() {
      const name = document.getElementById("studentName").value.trim();
      const code = document.getElementById("studentCode").value.trim();
      const clazz = document.getElementById("studentClass").value.trim();
      const dobText = document.getElementById("studentDob").value.trim(); // dd/mm/yyyy
      const bed = document.getElementById("bedNumber").value.trim();
      const selectedRoom = document.getElementById("roomSelect").value;

      if (!name || !code || !clazz || !dobText || !bed) {
        alert("Vui lòng điền đầy đủ thông tin!");
        return;
      }

      
      if (!isValidDDMMYYYY(dobText)) {
        alert("Ngày sinh phải đúng định dạng dd/mm/yyyy và là ngày hợp lệ (VD: 23/04/2005)");
        return;
      }

      try {
        await apiFetch(`/api/rooms/${selectedRoom}/members`, {
          method: "POST",
          body: JSON.stringify({ code, name, clazz, dob: dobText, bed }),
        });

        alert(`Thêm sinh viên vào phòng ${selectedRoom} thành công!`);
        await loadRoom(selectedRoom);
        clearAddForm();
      } catch (e) {
        alert("Thêm sinh viên thất bại: " + e.message);
      }
    }

    async function deleteSelectedMembers() {
      const checkboxes = document.querySelectorAll('#deleteCheckboxList input[type="checkbox"]:checked');

      if (checkboxes.length === 0) {
        alert("Vui lòng chọn ít nhất một sinh viên để xóa!");
        return;
      }

      const selectedCodes = Array.from(checkboxes).map((cb) => cb.value);

      if (!confirm(`Bạn có chắc muốn xóa ${selectedCodes.length} sinh viên?`)) return;

      try {
        for (const code of selectedCodes) {
          await apiFetch(`/api/rooms/${currentRoom}/members/${code}`, { method: "DELETE" });
        }

        alert("Xóa thành công!");
        await loadRoom(currentRoom);
        await loadDeleteMembersList();
      } catch (e) {
        alert("Xóa thất bại: " + e.message);
      }
    }

    // ===== session giữ nguyên (nếu bạn đang dùng) =====
    function validateSession() {
      const sessionToken = localStorage.getItem("sessionToken");
      const sessionLastActivity = localStorage.getItem("sessionLastActivity");
      if (!sessionToken) return false;

      const currentTime = Date.now();
      const lastActivityTime = parseInt(sessionLastActivity);
      const timeoutDuration = 5 * 60 * 1000;

      if (currentTime - lastActivityTime > timeoutDuration) {
        logout();
        return false;
      }
      return true;
    }

    function updateActivityTime() {
      if (localStorage.getItem("sessionToken")) {
        localStorage.setItem("sessionLastActivity", Date.now());
      }
    }

    function goBack() { window.history.back(); }

    function logout() {
      localStorage.removeItem("sessionToken");
      localStorage.removeItem("sessionUsername");
      localStorage.removeItem("sessionStart");
      localStorage.removeItem("sessionLastActivity");
      window.location.href = "index.html";
    }

    function goToStudentInfo(studentCode) {
      sessionStorage.setItem("studentCode", studentCode);
      window.location.href = "studentinfo.html";
    }

    function goToBill(studentCode) {
      sessionStorage.setItem("billStudentCode", studentCode);
      window.location.href = "bill.html";
    }

    // ===== date helpers (giữ UI dd/mm/yyyy) =====
    function formatDateInput(input) {
      let value = input.value.replace(/\D/g, "");
      if (value.length >= 2) value = value.slice(0, 2) + "/" + value.slice(2);
      if (value.length >= 5) value = value.slice(0, 5) + "/" + value.slice(5, 9);
      input.value = value;
    }

    function convertToDateFormat(ddmmyyyy) {
      if (!ddmmyyyy || ddmmyyyy.length !== 10) return "";
      const parts = ddmmyyyy.split("/");
      if (parts.length !== 3) return "";
      return `${parts[2]}-${parts[1]}-${parts[0]}`;
    }

    function convertFromDateFormat(yyyymmdd) {
      if (!yyyymmdd || yyyymmdd.length !== 10) return "";
      const parts = yyyymmdd.split("-");
      if (parts.length !== 3) return "";
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function setupDateListeners() {
      const dobInput = document.getElementById("studentDob");
      const dobPicker = document.getElementById("studentDobPicker");

      if (dobInput && dobPicker) {
        dobInput.oninput = function () {
          formatDateInput(this);
          if (this.value.length === 10) dobPicker.value = convertToDateFormat(this.value);
          else dobPicker.value = "";
        };

        dobPicker.onchange = function () {
          if (this.value) dobInput.value = convertFromDateFormat(this.value);
        };
      }
    }

    // init
    window.addEventListener("load", function () {
      
      if (!validateSession()) window.location.href = "index.html";

      const urlParams = new URLSearchParams(window.location.search);
      const viewMode = urlParams.get("view");

      if (viewMode === "overview") showOverview();
      else loadRoom("A1");

      document.querySelectorAll("[data-room]").forEach((link) => {
        link.addEventListener("click", function (e) {
          e.preventDefault();
          loadRoom(this.getAttribute("data-room"));
        });
      });

      document.addEventListener("click", updateActivityTime);
      document.addEventListener("keypress", updateActivityTime);
    });

    
    window.onclick = function (event) {
      const editModal = document.getElementById("editMemberModal");
      if (event.target === editModal) editModal.style.display = "none";
    };

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        const editModal = document.getElementById("editMemberModal");
        if (editModal.style.display === "block") editModal.style.display = "none";
      }
    });
  </script>
</body>
</html>
